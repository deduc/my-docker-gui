<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyDocker GUI</title>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #36393f;
            min-height: 100vh;
            color: #dcddde;
            margin: 0;
            padding: 0;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
        }

        main {
            flex: 1;
            padding: 0;
            background: transparent;
            width: 100%;
            max-width: 1200px;
        }

        #main-content {
            width: 100%;
            height: 100%;
        }

        /* Global styles for loading and error states */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
            font-size: 1.2rem;
            color: #666;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem;
            text-align: center;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5a6fd8;
        }

        /* Animation classes */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }

        /* Responsive utilities */
        @media (max-width: 768px) {
            body {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <app-header></app-header>
        <main>
            <div id="main-content">
                <!-- Content will be loaded here by router -->
            </div>
        </main>
    </div>

    <!-- Components -->
    <script src="components/header.js"></script>
    
    <!-- Pages -->
    <script src="pages/dashboard.js"></script>
    <script src="pages/create-single.js"></script>
    <script src="pages/create-multiple.js"></script>
    
    <!-- Router -->
    <script src="router.js"></script>
</body>
</html>
