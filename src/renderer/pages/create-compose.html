<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Crear Docker Compose - My Docker GUI</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>
    <div id="app">
        <!-- Header Component -->
        <header-component></header-component>
        
        <!-- Main Content -->
        <main class="create-layout">
            <div class="create-header">
                <h1>📄 Crear Docker Compose</h1>
                <p>Genera un archivo docker-compose.yml para múltiples servicios</p>
            </div>
            
            <div class="create-content">
                <!-- Form Section (70%) -->
                <div class="form-section">
                    <form id="composeForm">
                        <!-- Configuración General -->
                        <div class="form-section">
                            <h3>Configuración General</h3>
                            
                            <div class="form-group">
                                <label for="composeVersion">Versión de Compose:</label>
                                <select id="composeVersion" name="composeVersion" class="form-control">
                                    <option value="3.8">3.8</option>
                                    <option value="3.7">3.7</option>
                                    <option value="3.6">3.6</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="networkName">Nombre de la Red:</label>
                                <input type="text" id="networkName" name="networkName" class="form-control" placeholder="ej: mi-red">
                            </div>

                            <div class="form-group">
                                <label for="networkDriver">Driver de Red:</label>
                                <select id="networkDriver" name="networkDriver" class="form-control">
                                    <option value="bridge">Bridge</option>
                                    <option value="host">Host</option>
                                    <option value="overlay">Overlay</option>
                                    <option value="none">None</option>
                                </select>
                            </div>
                        </div>

                        <!-- Servicio 1 -->
                        <div class="service-config" id="service1">
                            <h3>Servicio 1</h3>
                            <div class="form-group">
                                <label for="service1Name">Nombre del Servicio:</label>
                                <input type="text" id="service1Name" name="service1Name" class="form-control" placeholder="ej: web" required>
                            </div>

                            <div class="form-group">
                                <label for="service1Image">Imagen:</label>
                                <input type="text" id="service1Image" name="service1Image" class="form-control" placeholder="ej: nginx:latest" required>
                            </div>

                            <div class="form-group">
                                <label for="service1ContainerName">Nombre del Contenedor:</label>
                                <input type="text" id="service1ContainerName" name="service1ContainerName" class="form-control" placeholder="ej: mi-nginx">
                            </div>

                            <div class="form-group">
                                <label>Puertos:</label>
                                <div id="service1Ports" class="port-mappings">
                                    <div class="port-mapping">
                                        <input type="number" placeholder="Host" class="form-control host-port">
                                        <span>:</span>
                                        <input type="number" placeholder="Contenedor" class="form-control container-port">
                                        <button type="button" class="btn btn-small btn-remove" onclick="removePortMapping('service1Ports', this)">Eliminar</button>
                                    </div>
                                </div>
                                <button type="button" class="btn btn-small" onclick="addPortMapping('service1Ports')">+ Añadir Puerto</button>
                            </div>

                            <div class="form-group">
                                <label for="service1Volumes">Volúmenes:</label>
                                <textarea id="service1Volumes" name="service1Volumes" class="form-control" rows="2" placeholder="ej: /ruta/local:/ruta/contenedor"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="service1Environment">Variables de Entorno:</label>
                                <textarea id="service1Environment" name="service1Environment" class="form-control" rows="2" placeholder="ej: NODE_ENV=production&#10;PORT=3000"></textarea>
                            </div>

                            <div class="form-group">
                                <label for="service1Command">Comando:</label>
                                <input type="text" id="service1Command" name="service1Command" class="form-control" placeholder="ej: nginx -g 'daemon off;'">
                            </div>
                        </div>

                        <!-- Botón para añadir más servicios -->
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="addService()">+ Añadir Servicio</button>
                        </div>

                        <!-- Actions -->
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Generar YAML</button>
                            <button type="button" class="btn btn-secondary" onclick="clearForm()">Limpiar</button>
                            <button type="button" class="btn" onclick="saveComposeFile()">💾 Guardar</button>
                            <button type="button" class="btn" onclick="executeCompose()">▶️ Ejecutar</button>
                            <button type="button" class="btn" onclick="goBack()">← Volver</button>
                        </div>
                    </form>
                </div>

                <!-- Output Section (30%) -->
                <div class="output-section">
                    <h3>docker-compose.yml:</h3>
                    <div id="outputContent" class="output-content">
                        El archivo YAML aparecerá aquí cuando generes la configuración...
                    </div>
                    <div class="output-actions">
                        <button class="btn btn-small" onclick="copyToClipboard()">📋 Copiar</button>
                        <button class="btn btn-small" onclick="downloadFile()">⬇️ Descargar</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Components -->
    <script src="../components/header.js"></script>
    
    <!-- Page Script -->
    <script src="../pages/create-compose.js"></script>
</body>
</html>
