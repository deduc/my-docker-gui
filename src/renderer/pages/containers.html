<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Contenedores - My Docker GUI</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>
    <div id="app">
        <!-- Header Component -->
        <header-component></header-component>
        
        <!-- Main Content -->
        <main class="dashboard">
            <div class="page-header">
                <h1>🐳 Todos los Contenedores</h1>
                <button class="btn btn-small refresh-btn" onclick="refreshAllContainers()">🔄 Actualizar Todo</button>
            </div>

            <!-- Filters Section -->
            <div class="filters-section">
                <div class="filter-group">
                    <label for="statusFilter">Filtrar por estado:</label>
                    <select id="statusFilter" class="form-control" onchange="filterContainers()">
                        <option value="all">Todos</option>
                        <option value="running">Corriendo</option>
                        <option value="exited">Detenidos</option>
                        <option value="paused">Pausados</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="searchFilter">Buscar:</label>
                    <input type="text" id="searchFilter" class="form-control" placeholder="Nombre o imagen..." oninput="filterContainers()">
                </div>
            </div>

            <!-- Containers Grid -->
            <div class="all-containers-section">
                <div id="allContainersList" class="resource-grid"></div>
            </div>

            <!-- Back Button -->
            <div class="back-section">
                <a href="../home.html" class="btn btn-secondary">← Volver al Dashboard</a>
            </div>
        </main>
    </div>

    <!-- Components -->
    <script src="../components/header.js"></script>
    <script src="../components/container-card.js"></script>
    
    <!-- Page Script -->
    <script src="../pages/containers.js"></script>
</body>
</html>
