<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Crear Múltiples Contenedores - My Docker GUI</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>
    <div id="app">
        <!-- Header Component -->
        <header-component></header-component>
        
        <!-- Main Content -->
        <main class="create-layout">
            <div class="create-header">
                <h1>🔗 Crear Múltiples Contenedores</h1>
                <p>Configura una red y despliega múltiples contenedores conectados</p>
            </div>
            
            <div class="create-content">
                <!-- Form Section (70%) -->
                <div class="form-section">
                    <form id="multiContainerForm">
                        <!-- Configuración de Red -->
                        <div class="form-section">
                            <h3>Configuración de Red</h3>
                            
                            <div class="form-group">
                                <label for="networkName">Nombre de la Red:</label>
                                <input type="text" id="networkName" name="networkName" class="form-control" placeholder="ej: mi-red">
                            </div>

                            <div class="form-group">
                                <label for="networkDriver">Driver de Red:</label>
                                <select id="networkDriver" name="networkDriver" class="form-control">
                                    <option value="bridge">Bridge</option>
                                    <option value="host">Host</option>
                                    <option value="overlay">Overlay</option>
                                    <option value="none">None</option>
                                </select>
                            </div>
                        </div>

                        <!-- Contenedor 1 -->
                        <div class="container-config" id="container1">
                            <h3>Contenedor 1</h3>
                            <div class="form-group">
                                <label for="container1Name">Nombre del Contenedor:</label>
                                <input type="text" id="container1Name" name="container1Name" class="form-control" placeholder="ej: web-server">
                            </div>

                            <div class="form-group">
                                <label for="container1Image">Imagen:</label>
                                <input type="text" id="container1Image" name="container1Image" class="form-control" placeholder="ej: nginx, ubuntu:20.04" required>
                            </div>

                            <div class="form-group">
                                <label>Puertos:</label>
                                <div class="port-mapping">
                                    <input type="number" placeholder="Host" class="form-control host-port">
                                    <span>:</span>
                                    <input type="number" placeholder="Contenedor" class="form-control container-port">
                                </div>
                            </div>
                        </div>

                        <!-- Botón para añadir más contenedores -->
                        <div class="form-actions">
                            <button type="button" class="btn btn-secondary" onclick="addContainer()">+ Añadir Contenedor</button>
                        </div>

                        <!-- Actions -->
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Generar Comandos</button>
                            <button type="button" class="btn btn-secondary" onclick="clearForm()">Limpiar</button>
                            <button type="button" class="btn" onclick="executeCommands()">▶️ Ejecutar</button>
                            <button type="button" class="btn" onclick="goBack()">← Volver</button>
                        </div>
                    </form>
                </div>

                <!-- Output Section (30%) -->
                <div class="output-section">
                    <h3>Comandos Generados:</h3>
                    <div id="outputContent" class="output-content">
                        Los comandos aparecerán aquí cuando generes la configuración...
                    </div>
                    <div class="output-actions">
                        <button class="btn btn-small" onclick="copyToClipboard()">📋 Copiar</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Components -->
    <script src="../components/header.js"></script>
    
    <!-- Page Script -->
    <script src="../pages/create-multi.js"></script>
</body>
</html>
