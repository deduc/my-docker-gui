<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
    <title>Imágenes - My Docker GUI</title>
    <link rel="stylesheet" href="../styles/main.css">
    <link rel="stylesheet" href="../styles/components.css">
</head>
<body>
    <div id="app">
        <!-- Header Component -->
        <header-component></header-component>
        
        <!-- Main Content -->
        <main class="dashboard">
            <div class="page-header">
                <h1>📦 Todas las Imágenes</h1>
                <button class="btn btn-small refresh-btn" onclick="refreshAllImages()">🔄 Actualizar Todo</button>
            </div>

            <!-- Filters Section -->
            <div class="filters-section">
                <div class="filter-group">
                    <label for="searchFilter">Buscar:</label>
                    <input type="text" id="searchFilter" class="form-control" placeholder="Nombre o tag..." oninput="filterImages()">
                </div>
                <div class="filter-group">
                    <label for="sizeFilter">Filtrar por tamaño:</label>
                    <select id="sizeFilter" class="form-control" onchange="filterImages()">
                        <option value="all">Todos</option>
                        <option value="small">Pequeñas (&lt;100MB)</option>
                        <option value="medium">Medianas (100MB-1GB)</option>
                        <option value="large">Grandes (&gt;1GB)</option>
                    </select>
                </div>
            </div>

            <!-- Images Grid -->
            <div class="all-images-section">
                <div id="allImagesList" class="resource-grid"></div>
            </div>

            <!-- Back Button -->
            <div class="back-section">
                <a href="../home.html" class="btn btn-secondary">← Volver al Dashboard</a>
            </div>
        </main>
    </div>

    <!-- Components -->
    <script src="../components/header.js"></script>
    <script src="../components/image-card.js"></script>
    
    <!-- Page Script -->
    <script src="../pages/images.js"></script>
</body>
</html>
