<container-header></container-header>

<div class="container-content" style="padding-top: 1rem;">
    <div class="container-row">
        <div class="container-col left-col" style="width: 60%;">
            <h1>Crear Contenedor</h1>
            
            <form id="create-container-form">
                <!-- Nombre del contenedor -->
                <div class="form-group">
                    <label for="container-name">Nombre del Contenedor: <span class="required">*</span></label>
                    <input type="text" id="container-name" name="name" placeholder="mi-contenedor" required>
                </div>

                <!-- Imagen -->
                <div class="form-group">
                    <label for="container-image">Imagen: <span class="required">*</span></label>
                    <select id="container-image" name="image" required>
                        <option value="">Selecciona una imagen...</option>
                    </select>
                </div>

                <!-- Detach mode -->
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="detach-mode" name="detach" checked>
                        Ejecutar en segundo plano (detach)
                    </label>
                </div>

                <!-- Puertos -->
                <div class="form-group">
                    <label>Puertos:</label>
                    <div class="ports-options">
                        <label>
                            <input type="checkbox" id="publish-all" name="publishAll">
                            Abrir todos los puertos (-P)
                        </label>
                    </div>
                    <div id="ports-list">
                        <div class="port-mapping">
                            <input type="text" placeholder="Host port" class="host-port">
                            <span>:</span>
                            <input type="text" placeholder="Container port" class="container-port">
                            <button type="button" class="remove-port">-</button>
                        </div>
                    </div>
                    <button type="button" id="add-port">+ Añadir puerto</button>
                </div>

                <!-- Hostname -->
                <div class="form-group">
                    <label for="hostname">Hostname (opcional):</label>
                    <input type="text" id="hostname" name="hostname" placeholder="mi-host">
                </div>

                <!-- Volumen -->
                <div class="form-group">
                    <label for="volume">Volumen (opcional):</label>
                    <input type="text" id="volume" name="volume" placeholder="/ruta/host:/ruta/container">
                </div>

                <!-- Variables de entorno -->
                <div class="form-group">
                    <label>Variables de Entorno:</label>
                    <div id="env-list">
                        <div class="env-var">
                            <input type="text" placeholder="Variable" class="env-key">
                            <input type="text" placeholder="Valor" class="env-value">
                            <button type="button" class="remove-env">-</button>
                        </div>
                    </div>
                    <button type="button" id="add-env">+ Añadir variable</button>
                </div>

                <!-- Env file -->
                <div class="form-group">
                    <label for="env-file">Archivo .env (opcional):</label>
                    <input type="text" id="env-file" name="envFile" placeholder="/ruta/.env">
                </div>

                <!-- Comando -->
                <div class="form-group">
                    <label for="command">Comando a ejecutar (opcional):</label>
                    <input type="text" id="command" name="command" placeholder="nginx -g 'daemon off;'">
                </div>

                <!-- Botones -->
                <div class="form-actions">
                    <button type="button" id="reset-form" class="btn-secondary">Limpiar formulario</button>
                </div>
            </form>
        </div>
        <div class="container-col right-col" style="width: 40%;">
            <h1>Vista Previa</h1>
            <div id="command-preview">
                <div class="command-header">
                    <h3>Comando Docker:</h3>
                    <button type="submit" form="create-container-form" class="btn-create-container">Crear Contenedor</button>
                </div>
                <pre id="docker-command">docker run --name mi-contenedor nginx:latest</pre>
                <div class="command-header">
                    <h3>Docker Compose:</h3>
                    <button type="submit" form="create-container-form" class="btn-create-container">Crear Contenedor</button>
                </div>
                <pre id="docker-compose">version: '3.8'
services:
  web:
    image: nginx:latest
    container_name: mi-contenedor
    restart: unless-stopped</pre>
            </div>
            <div id="config-preview">
                <h3>Configuración:</h3>
                <div id="config-details">
                    <p>Completa el formulario para ver la configuración</p>
                </div>
            </div>
        </div>
    </div>
</div>
