<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Docker GUI - Generador de Configuraciones</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🐳 My Docker GUI</h1>
            <p>Generador de configuraciones Docker sin necesidad de memorizar comandos</p>
        </header>

        <main>
            <form id="dockerForm">
                <div class="config-section">
                    <h2>Tipo de Configuración</h2>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="singleContainer" name="configType" value="single" checked>
                            <label for="singleContainer">Contenedor Individual</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="multiContainer" name="configType" value="multi">
                            <label for="multiContainer">Múltiples Contenedores</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="dockerCompose" name="configType" value="compose">
                            <label for="dockerCompose">Docker Compose</label>
                        </div>
                    </div>
                </div>

                <div class="config-section">
                    <h2>Configuración del Contenedor</h2>
                    
                    <div class="form-group">
                        <label for="imageName">Nombre de la Imagen:</label>
                        <input type="text" id="imageName" name="imageName" placeholder="ej: nginx, ubuntu:20.04, mysql:8.0" required>
                    </div>

                    <div class="form-group">
                        <label for="containerName">Nombre del Contenedor:</label>
                        <input type="text" id="containerName" name="containerName" placeholder="ej: mi-nginx, mi-base-de-datos">
                    </div>

                    <div class="form-group">
                        <label for="version">Versión (opcional):</label>
                        <input type="text" id="version" name="version" placeholder="ej: latest, 20.04, 8.0">
                    </div>

                    <div class="form-group">
                        <label>Puertos Expuestos:</label>
                        <div id="portMappings">
                            <div class="port-mapping">
                                <input type="number" placeholder="Puerto host" class="host-port">
                                <span>:</span>
                                <input type="number" placeholder="Puerto contenedor" class="container-port">
                                <button type="button" class="btn remove-port-btn" onclick="removePortMapping(this)">Eliminar</button>
                            </div>
                        </div>
                        <button type="button" class="btn add-port-btn" onclick="addPortMapping()">+ Añadir Puerto</button>
                    </div>

                    <div class="form-group">
                        <label for="volumes">Volúmenes (opcional):</label>
                        <textarea id="volumes" name="volumes" rows="3" placeholder="ej: /ruta/local:/ruta/contenedor&#10;/otra/ruta:/ruta/en/contenedor"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="environment">Variables de Entorno (opcional):</label>
                        <textarea id="environment" name="environment" rows="3" placeholder="ej: MYSQL_ROOT_PASSWORD=mipassword&#10;DATABASE_NAME=midb"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="command">Comando a ejecutar (opcional):</label>
                        <input type="text" id="command" name="command" placeholder="ej: nginx -g 'daemon off;'">
                    </div>
                </div>

                <div class="config-section" id="multiContainerSection" style="display: none;">
                    <h2>Configuración de Red</h2>
                    
                    <div class="form-group">
                        <label for="networkName">Nombre de la Red:</label>
                        <input type="text" id="networkName" name="networkName" placeholder="ej: mi-red">
                    </div>

                    <div class="form-group">
                        <label for="networkDriver">Driver de Red:</label>
                        <select id="networkDriver" name="networkDriver">
                            <option value="bridge">Bridge</option>
                            <option value="host">Host</option>
                            <option value="overlay">Overlay</option>
                            <option value="none">None</option>
                        </select>
                    </div>
                </div>

                <div class="config-section">
                    <button type="submit" class="btn">Generar Configuración</button>
                    <button type="button" class="btn btn-secondary" onclick="clearForm()">Limpiar Formulario</button>
                </div>
            </form>

            <div class="output-section hidden" id="outputSection">
                <h3>Configuración Generada:</h3>
                <div class="output-content" id="outputContent"></div>
                <button class="copy-btn" onclick="copyToClipboard()">📋 Copiar al Portapapeles</button>
            </div>
        </main>
    </div>

    <script>
        // Cambiar visibilidad de secciones según el tipo de configuración
        document.querySelectorAll('input[name="configType"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const multiSection = document.getElementById('multiContainerSection');
                if (this.value === 'multi' || this.value === 'compose') {
                    multiSection.style.display = 'block';
                } else {
                    multiSection.style.display = 'none';
                }
            });
        });

        // Añadir mapeo de puertos
        function addPortMapping() {
            const portMappings = document.getElementById('portMappings');
            const newMapping = document.createElement('div');
            newMapping.className = 'port-mapping';
            newMapping.innerHTML = `
                <input type="number" placeholder="Puerto host" class="host-port">
                <span>:</span>
                <input type="number" placeholder="Puerto contenedor" class="container-port">
                <button type="button" class="btn remove-port-btn" onclick="removePortMapping(this)">Eliminar</button>
            `;
            portMappings.appendChild(newMapping);
        }

        // Eliminar mapeo de puertos
        function removePortMapping(button) {
            const portMappings = document.getElementById('portMappings');
            if (portMappings.children.length > 1) {
                button.parentElement.remove();
            }
        }

        // Generar configuración
        document.getElementById('dockerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            generateConfiguration();
        });

        function generateConfiguration() {
            const configType = document.querySelector('input[name="configType"]:checked').value;
            const imageName = document.getElementById('imageName').value;
            const containerName = document.getElementById('containerName').value;
            const version = document.getElementById('version').value;
            const command = document.getElementById('command').value;
            const volumes = document.getElementById('volumes').value;
            const environment = document.getElementById('environment').value;
            
            // Obtener puertos
            const portMappings = document.querySelectorAll('.port-mapping');
            const ports = [];
            portMappings.forEach(mapping => {
                const hostPort = mapping.querySelector('.host-port').value;
                const containerPort = mapping.querySelector('.container-port').value;
                if (hostPort && containerPort) {
                    ports.push(`${hostPort}:${containerPort}`);
                }
            });

            let output = '';

            if (configType === 'single') {
                output = generateDockerCommand(imageName, containerName, version, ports, volumes, environment, command);
            } else if (configType === 'multi') {
                output = generateMultiContainerCommands(imageName, containerName, version, ports, volumes, environment, command);
            } else if (configType === 'compose') {
                output = generateDockerCompose(imageName, containerName, version, ports, volumes, environment, command);
            }

            document.getElementById('outputContent').textContent = output;
            document.getElementById('outputSection').classList.remove('hidden');
        }

        function generateDockerCommand(imageName, containerName, version, ports, volumes, environment, command) {
            let cmd = 'docker run -d';
            
            if (containerName) {
                cmd += ` --name ${containerName}`;
            }
            
            ports.forEach(port => {
                cmd += ` -p ${port}`;
            });
            
            if (volumes) {
                const volumeLines = volumes.trim().split('\n');
                volumeLines.forEach(volume => {
                    if (volume.trim()) {
                        cmd += ` -v ${volume.trim()}`;
                    }
                });
            }
            
            if (environment) {
                const envLines = environment.trim().split('\n');
                envLines.forEach(env => {
                    if (env.trim()) {
                        cmd += ` -e ${env.trim()}`;
                    }
                });
            }
            
            const fullImageName = version ? `${imageName}:${version}` : imageName;
            cmd += ` ${fullImageName}`;
            
            if (command) {
                cmd += ` ${command}`;
            }
            
            return cmd;
        }

        function generateMultiContainerCommands(imageName, containerName, version, ports, volumes, environment, command) {
            const networkName = document.getElementById('networkName').value || 'mi-red';
            const networkDriver = document.getElementById('networkDriver').value;
            
            let commands = `# Crear red de contenedores\n`;
            commands += `docker network create --driver ${networkDriver} ${networkName}\n\n`;
            
            commands += `# Crear contenedor\n`;
            commands += generateDockerCommand(imageName, containerName, version, ports, volumes, environment, command);
            commands += ` --network ${networkName}\n\n`;
            
            commands += `# Comandos adicionales para conectar otros contenedores a la red:\n`;
            commands += `# docker run -d --name otro-contenedor --network ${networkName} otra-imagen\n`;
            
            return commands;
        }

        function generateDockerCompose(imageName, containerName, version, ports, volumes, environment, command) {
            const networkName = document.getElementById('networkName').value || 'mi-red';
            const networkDriver = document.getElementById('networkDriver').value;
            
            let yaml = `version: '3.8'\n\n`;
            yaml += `services:\n`;
            yaml += `  ${containerName || 'servicio'}:\n`;
            yaml += `    image: ${version ? `${imageName}:${version}` : imageName}\n`;
            yaml += `    container_name: ${containerName || 'contenedor'}\n`;
            
            if (ports.length > 0) {
                yaml += `    ports:\n`;
                ports.forEach(port => {
                    yaml += `      - "${port}"\n`;
                });
            }
            
            if (volumes) {
                yaml += `    volumes:\n`;
                const volumeLines = volumes.trim().split('\n');
                volumeLines.forEach(volume => {
                    if (volume.trim()) {
                        yaml += `      - ${volume.trim()}\n`;
                    }
                });
            }
            
            if (environment) {
                yaml += `    environment:\n`;
                const envLines = environment.trim().split('\n');
                envLines.forEach(env => {
                    if (env.trim()) {
                        const [key, value] = env.trim().split('=');
                        yaml += `      - ${key}=${value}\n`;
                    }
                });
            }
            
            if (command) {
                yaml += `    command: ${command}\n`;
            }
            
            yaml += `    restart: unless-stopped\n\n`;
            
            yaml += `networks:\n`;
            yaml += `  ${networkName}:\n`;
            yaml += `    driver: ${networkDriver}\n`;
            
            return yaml;
        }

        function copyToClipboard() {
            const outputContent = document.getElementById('outputContent').textContent;
            navigator.clipboard.writeText(outputContent).then(function() {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ ¡Copiado!';
                btn.style.background = 'linear-gradient(135deg, #27ae60 0%, #229954 100%)';
                
                setTimeout(function() {
                    btn.textContent = originalText;
                    btn.style.background = '';
                }, 2000);
            });
        }

        function clearForm() {
            document.getElementById('dockerForm').reset();
            document.getElementById('outputSection').classList.add('hidden');
            
            // Resetear puertos a solo uno
            const portMappings = document.getElementById('portMappings');
            portMappings.innerHTML = `
                <div class="port-mapping">
                    <input type="number" placeholder="Puerto host" class="host-port">
                    <span>:</span>
                    <input type="number" placeholder="Puerto contenedor" class="container-port">
                    <button type="button" class="btn remove-port-btn" onclick="removePortMapping(this)">Eliminar</button>
                </div>
            `;
        }
    </script>
</body>
</html>
